<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FBL – Scheme Day Contest</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

:root{
--gold:#D4AF37;
--green:#2dd4bf;
}

header{
text-align:center;
padding:18px;
border-bottom:2px solid var(--gold);
position:relative;
}

h1{
margin:0;
color:var(--gold);
font-size:36px;
}

.subtitle{
color:#ddd;
font-size:14px;
}

.clock{
position:absolute;
right:30px;
top:18px;
font-size:14px;
}

.container{
padding:20px 30px;
}

h2{
color:var(--gold);
margin-bottom:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:16px;
}

.card{
background:rgba(0,0,0,0.35);
border-radius:12px;
border:1px solid rgba(255,255,255,0.08);
padding:14px;
display:flex;
flex-direction:column;
justify-content:center;
}

.team{
position:relative;
margin-bottom:8px;
}

.teamname{
font-weight:bold;
font-size:16px;
}

.stats{
font-size:13px;
color:#ccc;
}

.progress{
height:7px;
background:#444;
border-radius:5px;
margin-top:3px;
overflow:hidden;
}

.bar{
height:7px;
background:var(--green);
}

.vs{
text-align:center;
font-size:12px;
color:var(--gold);
margin:6px 0;
}

.crown{
position:absolute;
right:-8px;
top:-6px;
font-size:18px;
animation:crownGlow 2s infinite alternate;
}

@keyframes crownGlow{
from{ text-shadow:0 0 6px gold;}
to{ text-shadow:0 0 20px gold;}
}

.top-performer{
margin-top:18px;
padding:12px;
background:rgba(0,0,0,0.35);
border-radius:10px;
text-align:center;
font-size:18px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:12px;
font-size:14px;
}

th,td{
padding:8px;
border-bottom:1px solid rgba(255,255,255,0.1);
text-align:center;
}

th{
color:var(--gold);
}

.rank1{
background:rgba(212,175,55,0.25);
}

.scroll-btn{
position:fixed;
bottom:20px;
right:25px;
background:var(--gold);
border:none;
padding:12px 20px;
border-radius:30px;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 12px gold;
}

.footer{
text-align:center;
padding:15px;
color:#ccc;
}
</style>
</head>

<body>

<header>
<h1>FBL – Scheme Day Contest</h1>
<div class="subtitle">Live Scheme Enrollment Scoreboard</div>

<div class="clock">
<div id="date"></div>
<div id="time"></div>
</div>
</header>

<div class="container">

<h2>Showroom Matchups</h2>
<div class="grid" id="matchups"></div>

<div class="top-performer">
👑 Top Performer :
<span id="leaderName"></span><br>
<span id="leaderStats"></span>
</div>

</div>

<div class="container" id="leaderboardSection">

<table>
<thead>
<tr>
<th>Rank</th>
<th>Showroom</th>
<th>Target</th>
<th>Achieved</th>
<th>%</th>
</tr>
</thead>

<tbody id="leaderboard"></tbody>

</table>

</div>

<button class="scroll-btn" onclick="scrollLeaderboard()">
View Leaderboard ↓
</button>

<div class="footer">
Winning showroom from each matchup qualifies for Phase 2 Contest
</div>

<script>

// ALL TEAMS → TARGET FIXED 5,00,000
const showroomData=[
{name:"HOSBMR",target:500000,achieved:167000},
{name:"PYDKMR",target:500000,achieved:97000},

{name:"POLBST",target:500000,achieved:40000},
{name:"VELASL",target:500000,achieved:72000},

{name:"RMDSVS",target:500000,achieved:69000},
{name:"TRIBRD",target:500000,achieved:1000},

{name:"SLMSRM",target:500000,achieved:64000},
{name:"ANRSAE",target:500000,achieved:130000},
];

// MATCHUPS FROM IMAGE
const matchups=[
["HOSBMR","PYDKMR"],
["POLBST","VELASL"],
["RMDSVS","TRIBRD"],
["SLMSRM","ANRSAE"]
];

function getTeam(name){
return showroomData.find(t=>t.name===name)
}

function percent(t){
return ((t.achieved/t.target)*100).toFixed(1)
}

function money(n){
return "₹"+n.toLocaleString("en-IN")
}

function findLeader(){
return [...showroomData].sort((a,b)=>
(b.achieved/b.target)-(a.achieved/a.target)
)[0]
}

function renderMatchups(){

const leader=findLeader()
const container=document.getElementById("matchups")

matchups.forEach(match=>{

let html=`<div class="card">`

match.forEach((team,index)=>{

const t=getTeam(team)
const isLeader=(t.name===leader.name)

html+=`
<div class="team">
${isLeader?'<span class="crown">👑</span>':''}
<div class="teamname">${t.name}</div>

<div class="stats">
Target: ${money(t.target)}<br>
Achieved: ${money(t.achieved)}
</div>

<div class="progress">
<div class="bar" style="width:${percent(t)}%"></div>
</div>
${percent(t)}%
</div>
`

if(index<match.length-1)
html+=`<div class="vs">VS</div>`

})

html+=`</div>`
container.innerHTML+=html

})
}

function leaderboard(){

let data=[...showroomData]
data.forEach(t=>t.p=(t.achieved/t.target)*100)
data.sort((a,b)=>b.p-a.p)

const table=document.getElementById("leaderboard")

data.forEach((t,i)=>{

let row=document.createElement("tr")
if(i==0)row.classList.add("rank1")

row.innerHTML=`
<td>${i+1}</td>
<td>${t.name}</td>
<td>${money(t.target)}</td>
<td>${money(t.achieved)}</td>
<td>${t.p.toFixed(1)}%</td>
`

table.appendChild(row)

})

const leader=data[0]

document.getElementById("leaderName").innerText=leader.name
document.getElementById("leaderStats").innerText=
leader.p.toFixed(1)+"% | "+money(leader.achieved)
}

function clock(){
setInterval(()=>{
let now=new Date()
document.getElementById("time").innerText=now.toLocaleTimeString()
document.getElementById("date").innerText=now.toDateString()
},1000)
}

function scrollLeaderboard(){
document.getElementById("leaderboardSection")
.scrollIntoView({behavior:"smooth"})
}

renderMatchups()
leaderboard()
clock()

</script>

</body>
</html>
